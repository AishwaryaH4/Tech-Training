<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Tags</title>
</head>
<body>
    <p>Paragraph 1</p>
    <p>Paragraph 2</p>
    <p>Paragraph 3</p>
    <script>
        let par=document.getElementsByTagName("p");
        for(let i=0;i<par.length;i++){
            par[i].style.color="purple";
        }
    </script>
</body>
</html>
