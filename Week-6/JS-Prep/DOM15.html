<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Changer</title>
</head>
<body>
    <div id="dragItem" draggable="true" ondragstart="drag(event)">Drag Me</div>
    <div id="dropArea" ondrop="drop(event)" ondragover="allowDrop(event)" style="width: 100px;height: 100px;border: 80px dashed rgb(255, 0, 81)">Drop Here</div>

    <script>
        function drag(event) {
            event.dataTransfer.setData("text", event.target.id);
        }

        function allowDrop(event) {
            event.preventDefault();
        }

        function drop(event) {
            event.preventDefault();
            let data = event.dataTransfer.getData("text");
            event.target.appendChild(document.getElementById(data));
        }
    </script>
</body>
</html>
